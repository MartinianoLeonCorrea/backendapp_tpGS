$kind: http-request
name: Create Dictado
method: POST
url: '{{baseUrl}}/api/dictados'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "cursoId": 1,
      "materiaId": 1,
      "docenteDni": "87654321",
      "anio": 2025,
      "activo": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      pm.test("Response has id", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
      });
      pm.test("Response has curso and materia", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('curso');
        pm.expect(json).to.have.property('materia');
      });
