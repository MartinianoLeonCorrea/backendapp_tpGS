$kind: http-request
name: Get Dictados Activos by Persona
method: GET
url: '{{baseUrl}}/api/dictados/persona/:dni/activos'
order: 5000
pathVariables:
  - key: dni
    value: '87654321'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response is an array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('array');
      });
      pm.test("All dictados are active", function () {
        const json = pm.response.json();
        json.forEach(function (dictado) {
          pm.expect(dictado.activo).to.equal(true);
        });
      });
