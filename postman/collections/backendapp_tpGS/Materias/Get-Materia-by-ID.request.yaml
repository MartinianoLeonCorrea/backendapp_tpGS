$kind: http-request
name: Get Materia by ID
method: GET
url: '{{baseUrl}}/api/materias/1'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 or 404", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });
      pm.test("If found, response has id and nombre", function () {
        if (pm.response.code === 200) {
          const json = pm.response.json();
          pm.expect(json).to.have.property('id');
          pm.expect(json).to.have.property('nombre');
        }
      });
