$kind: http-request
name: Update Examen
method: PUT
url: '{{baseUrl}}/api/examenes/:id'
order: 6000
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fecha": "2025-07-20",
      "descripcion": "Primer parcial (reprogramado)"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has id", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
      });
      pm.test("Response has updated fecha", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('fecha');
      });
