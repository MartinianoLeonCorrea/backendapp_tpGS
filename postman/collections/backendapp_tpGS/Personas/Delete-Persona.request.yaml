$kind: http-request
name: Delete Persona
method: DELETE
url: '{{baseUrl}}/api/personas/:dni'
order: 7000
pathVariables:
  - key: dni
    value: '12345678'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 or 204", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
