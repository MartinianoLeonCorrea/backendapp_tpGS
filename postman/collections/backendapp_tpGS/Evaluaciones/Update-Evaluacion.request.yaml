$kind: http-request
name: Update Evaluacion
method: PUT
url: '{{baseUrl}}/api/evaluaciones/:id'
order: 8000
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nota": 9
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has id", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
      });
      pm.test("Response has updated nota", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('nota');
        pm.expect(json.nota).to.equal(9);
      });
