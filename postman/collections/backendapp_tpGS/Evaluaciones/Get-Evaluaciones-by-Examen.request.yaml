$kind: http-request
name: Get Evaluaciones by Examen
method: GET
url: '{{baseUrl}}/api/evaluaciones/examen/:examenId'
order: 3000
pathVariables:
  - key: examenId
    value: '1'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response is an array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('array');
      });
      pm.test("Each evaluacion has nota and alumno", function () {
        const json = pm.response.json();
        json.forEach(function (ev) {
          pm.expect(ev).to.have.property('nota');
          pm.expect(ev).to.have.property('alumno');
        });
      });
