$kind: http-request
name: Batch Update Evaluaciones
method: PUT
url: '{{baseUrl}}/api/evaluaciones/batch'
order: 9000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    [
      {
        "id": 1,
        "nota": 9
      },
      {
        "id": 2,
        "nota": 6
      },
      {
        "id": 3,
        "nota": 10
      }
    ]
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response is an array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('array');
      });
      pm.test("Each evaluacion has id and nota", function () {
        const json = pm.response.json();
        json.forEach(function (ev) {
          pm.expect(ev).to.have.property('id');
          pm.expect(ev).to.have.property('nota');
        });
      });
